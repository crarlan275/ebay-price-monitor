name: eBay Monitor Cron

on:
  schedule:
    # Corre cada 30 minutos, las 24 horas
    - cron: '*/30 * * * *'
  workflow_dispatch: # permite correrlo manualmente desde GitHub

jobs:
  run-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger cron
        run: |
          curl -s --max-time 60 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_URL }}/api/cron?force=true" \
            | jq '.'
